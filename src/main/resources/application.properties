spring.application.name=URLShortenerService

# Server Configuration
server.port=8081

# MySQL Database Configuration (Securely configured via environment variables)
spring.datasource.url=jdbc:mysql://localhost:3306/urlshortener?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Custom Base URL for Generated Short Links
# Locally, this will fall back to localhost so links are clickable and working.
# In production, just set the environment variable APP_BASE_URL in your cloud provider!
app.base-url=${APP_BASE_URL:}




