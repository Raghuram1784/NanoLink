<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoLink</title>
    <!-- Tabler Icons Web Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #16161a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating pastel background orbs and grid mesh */
        .mesh {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: orbFloat 15s ease-in-out infinite alternate;
        }

        .orb1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 122, 0, 0.18), transparent 70%);
            top: -200px;
            left: -150px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(226, 183, 20, 0.15), transparent 70%);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.12), transparent 70%);
            top: 30%;
            left: 50%;
            animation-delay: -9s;
        }

        .orb4 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.08), transparent 70%);
            top: 10%;
            right: 0%;
            animation-delay: -3s;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(50px, -40px) scale(1.05);
            }

            66% {
                transform: translate(-30px, 60px) scale(0.95);
            }

            100% {
                transform: translate(40px, 30px) scale(1.02);
            }
        }

        .grid-lines {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 182, 0, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 182, 0, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Glowing light particles drifting upwards */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 182, 0, 0.35);
            /* Glowing gold */
            border-radius: 50%;
            animation: floatUp 15s linear infinite;
            box-shadow: 0 0 10px rgba(255, 182, 0, 0.25);
        }

        .p1 {
            width: 3px;
            height: 3px;
            left: 10%;
            bottom: -10px;
            animation-duration: 14s;
            animation-delay: 0s;
        }

        .p2 {
            width: 4px;
            height: 4px;
            left: 25%;
            bottom: -10px;
            animation-duration: 18s;
            animation-delay: -3s;
        }

        .p3 {
            width: 2px;
            height: 2px;
            left: 40%;
            bottom: -10px;
            animation-duration: 12s;
            animation-delay: -6s;
        }

        .p4 {
            width: 5px;
            height: 5px;
            left: 55%;
            bottom: -10px;
            animation-duration: 22s;
            animation-delay: -2s;
        }

        .p5 {
            width: 3px;
            height: 3px;
            left: 70%;
            bottom: -10px;
            animation-duration: 16s;
            animation-delay: -5s;
        }

        .p6 {
            width: 4px;
            height: 4px;
            left: 85%;
            bottom: -10px;
            animation-duration: 20s;
            animation-delay: -8s;
        }

        .p7 {
            width: 2px;
            height: 2px;
            left: 15%;
            bottom: -10px;
            animation-duration: 10s;
            animation-delay: -4s;
        }

        .p8 {
            width: 5px;
            height: 5px;
            left: 35%;
            bottom: -10px;
            animation-duration: 24s;
            animation-delay: -1s;
        }

        .p9 {
            width: 3px;
            height: 3px;
            left: 65%;
            bottom: -10px;
            animation-duration: 15s;
            animation-delay: -7s;
        }

        .p10 {
            width: 4px;
            height: 4px;
            left: 80%;
            bottom: -10px;
            animation-duration: 19s;
            animation-delay: -3s;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 0.7;
            }

            90% {
                opacity: 0.7;
            }

            100% {
                transform: translateY(-110vh) translateX(50px);
                opacity: 0;
            }
        }

        /* Glassmorphism main card */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 540px;
            background: rgba(24, 24, 27, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 182, 0, 0.15);
            border-radius: 28px;
            padding: 2.5rem 2.25rem;
            animation: cardDrop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            box-shadow: 0 0 0 1px rgba(255, 182, 0, 0.05), 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        @keyframes cardDrop {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Logo and Header */
        .logo-wrap {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff7a00, #e2b714);
            margin-bottom: 1.25rem;
            position: relative;
            animation: logoPulse 3s ease-in-out infinite;
            box-shadow: 0 0 0 0 rgba(255, 122, 0, 0.4);
        }

        @keyframes logoPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 122, 0, 0.4), 0 0 30px rgba(255, 122, 0, 0.25);
            }

            50% {
                box-shadow: 0 0 0 16px rgba(255, 122, 0, 0), 0 0 50px rgba(255, 122, 0, 0.45);
            }
        }

        .logo-ring::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ff7a00, #e2b714, #ffb300, #ff7a00);
            z-index: -1;
            animation: rotateBorder 4s linear infinite;
            filter: blur(3px);
        }

        @keyframes rotateBorder {
            to {
                transform: rotate(360deg);
            }
        }

        .logo-icon {
            font-size: 30px;
            color: #fff;
        }

        .logo-wrap h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo-wrap p {
            font-size: 14.5px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.1px;
            font-weight: 500;
        }

        .gradient-text {
            background: linear-gradient(135deg, #ff7a00, #e2b714, #ffb300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Fields & Inputs */
        .field-wrap {
            position: relative;
            margin-bottom: .75rem;
        }

        .field-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: rgba(255, 255, 255, 0.35);
            pointer-events: none;
            transition: color .3s;
        }

        .url-in {
            width: 100%;
            padding: 16px 16px 16px 52px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 182, 0, 0.15);
            border-radius: 16px;
            color: #fff;
            font-size: 15.5px;
            font-family: inherit;
            transition: all .3s;
            outline: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .url-in::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .url-in:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: #ff7a00;
            box-shadow: 0 0 0 4px rgba(255, 122, 0, 0.15), 0 0 20px rgba(255, 122, 0, 0.1);
        }

        .url-in:focus~.field-icon,
        .field-wrap:focus-within .field-icon {
            color: #ff7a00;
        }

        .err {
            font-size: 13px;
            color: #ff7a00;
            margin-top: 6px;
            padding-left: 6px;
            animation: shake 0.35s ease;
            font-weight: 500;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-5px);
            }

            40%,
            80% {
                transform: translateX(5px);
            }
        }

        /* Buttons */
        .btn-main {
            width: 100%;
            padding: 16px;
            margin-top: .75rem;
            background: linear-gradient(135deg, #ff7a00 0%, #e2b714 100%);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform .2s, box-shadow .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 12px 40px rgba(255, 122, 0, 0.45);
        }

        .btn-main::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #ffa048 0%, #ffc837 100%);
            opacity: 0;
            transition: opacity .3s;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 122, 0, 0.55), 0 0 0 1px rgba(255, 122, 0, 0.3);
        }

        .btn-main:hover::before {
            opacity: 1;
        }

        .btn-main:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-main span,
        .btn-main i {
            position: relative;
            z-index: 1;
        }

        /* Dividers */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 1.75rem 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        /* Result Panel */
        .result {
            animation: resultPop .5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes resultPop {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(15px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .res-header {
            background: linear-gradient(135deg, rgba(255, 122, 0, 0.2), rgba(226, 183, 20, 0.15));
            border: 1px solid rgba(255, 182, 0, 0.3);
            border-radius: 16px 16px 0 0;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
        }

        .res-header i {
            font-size: 18px;
            color: #10b981;
        }

        .res-body {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-top: none;
            border-radius: 0 0 16px 16px;
            padding: 20px;
        }

        /* Dynamic Stats */
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .stat-box {
            flex: 1;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 182, 0, 0.1);
            border-radius: 12px;
            padding: 12px 6px;
            transition: all .2s;
        }

        .stat-box:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 122, 0, 0.3);
            transform: translateY(-2px);
        }

        .stat-num {
            font-size: 20px;
            font-weight: 700;
            color: #e2b714;
        }

        .stat-save {
            color: #10b981 !important;
        }

        .stat-lbl {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: .8px;
            font-weight: 600;
        }

        /* Result rows */
        .res-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            transition: all .25s;
        }

        .res-row:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .res-row:last-of-type {
            margin-bottom: 12px;
        }

        .res-lbl {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .res-val {
            font-size: 14.5px;
            color: rgba(255, 255, 255, 0.85);
            word-break: break-all;
            font-weight: 500;
            flex: 1;
            min-width: 0;
        }

        .res-val.short-v {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff7a00, #e2b714);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .res-val.code-v {
            font-family: 'Courier New', monospace;
            color: #e2b714;
            letter-spacing: 2px;
            font-size: 16px;
            font-weight: 700;
        }

        /* Icon Buttons */
        .ico-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 16px;
            transition: all .2s;
        }

        .ico-btn:hover {
            background: rgba(255, 122, 0, 0.15);
            border-color: rgba(255, 122, 0, 0.4);
            color: #ff7a00;
            transform: scale(1.08);
        }

        .ico-btn.ok {
            background: rgba(16, 185, 129, 0.15);
            border-color: #10b981;
            color: #10b981;
            animation: popBounce .3s ease;
        }

        @keyframes popBounce {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.25);
            }
        }

        .act-row {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .btn-s {
            flex: 1;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all .2s;
        }

        .btn-copy {
            background: linear-gradient(135deg, #ff7a00, #e2b714);
            color: #fff;
            border: none;
            box-shadow: 0 8px 25px rgba(255, 122, 0, 0.35);
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 122, 0, 0.45);
            opacity: .95;
        }

        .btn-copy:active {
            transform: scale(.98);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(255, 182, 0, 0.15);
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 182, 0, 0.3);
            color: #fff;
        }

        /* Copy Toast wrap */
        .toast-wrap {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(22, 22, 26, 0.96);
            border: 1px solid rgba(255, 182, 0, 0.3);
            border-radius: 40px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            z-index: 99;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 182, 0, 0.1);
            transition: transform .4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity .3s;
            opacity: 0;
            pointer-events: none;
        }

        .toast-wrap.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-wrap i {
            font-size: 16px;
            color: #10b981;
        }

        @media(max-width: 480px) {
            .card {
                padding: 1.75rem 1.25rem;
            }

            .logo-wrap h1 {
                font-size: 24px;
            }

            .act-row {
                flex-direction: column;
            }

            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="mesh">
        <div class="grid-lines"></div>
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
        <div class="orb orb4"></div>
        <!-- Light Particles -->
        <div class="particles">
            <div class="particle p1"></div>
            <div class="particle p2"></div>
            <div class="particle p3"></div>
            <div class="particle p4"></div>
            <div class="particle p5"></div>
            <div class="particle p6"></div>
            <div class="particle p7"></div>
            <div class="particle p8"></div>
            <div class="particle p9"></div>
            <div class="particle p10"></div>
        </div>
    </div>

    <div class="card">
        <div class="logo-wrap">
            <div class="logo-ring">
                <i class="ti ti-link logo-icon" aria-hidden="true"></i>
            </div>
            <h1><span class="gradient-text">URL Shortener</span></h1>
            <p>Transform long links into clean, shareable URLs</p>
        </div>

        <form th:action="@{/shorten}" method="post" th:object="${request}" id="shortenForm">
            <div class="field-wrap">
                <i class="ti ti-world field-icon" aria-hidden="true"></i>
                <input class="url-in" id="uInput" type="url" name="url" th:field="*{url}"
                    placeholder="https://your-very-long-url.com/goes/here" autocomplete="off" required />
            </div>
            <div th:if="${#fields.hasErrors('url')}" class="err" id="errMsg">
                <i class="ti ti-alert-circle" aria-hidden="true"></i> <span th:errors="*{url}">Please enter a valid URL
                    starting with http(s)://</span>
            </div>

            <button type="submit" class="btn-main" id="mainBtn">
                <span>Shorten URL</span>
                <i class="ti ti-arrow-right" aria-hidden="true"></i>
            </button>
        </form>

        <div class="divider" th:if="${response != null}">RESULT</div>

        <!-- Result Section -->
        <div class="result" id="resEl" th:if="${response != null}">
            <div class="res-header">
                <i class="ti ti-circle-check" aria-hidden="true"></i>
                Shortened successfully
            </div>
            <div class="res-body">
                <div class="stats" id="statsEl"></div>

                <div class="res-row">
                    <div style="flex:1;min-width:0">
                        <div class="res-lbl">Short URL</div>
                        <div class="res-val short-v" id="shortV" th:text="${response.shortUrl}" onclick="cpShort()">
                        </div>
                    </div>
                    <button class="ico-btn" id="cpBtn" onclick="cpShort()" aria-label="Copy short URL">
                        <i class="ti ti-copy" aria-hidden="true"></i>
                    </button>
                </div>

                <div class="res-row">
                    <div style="flex:1;min-width:0">
                        <div class="res-lbl">Original URL</div>
                        <div class="res-val" id="origV" th:text="${response.originalUrl}"
                            style="font-size:13px;color:rgba(255, 255, 255, 0.45);font-weight:400"></div>
                    </div>
                </div>

                <div class="res-row">
                    <div style="flex:1;min-width:0">
                        <div class="res-lbl">Short code</div>
                        <div class="res-val code-v" id="codeV" th:text="${response.shortCode}"></div>
                    </div>
                    <button class="ico-btn" id="codeBtn" onclick="cpCode()" aria-label="Copy code">
                        <i class="ti ti-copy" aria-hidden="true"></i>
                    </button>
                </div>

                <div class="act-row">
                    <button class="btn-s btn-copy" onclick="cpShortFull()">
                        <i class="ti ti-copy" aria-hidden="true"></i> Copy URL
                    </button>
                    <button class="btn-s btn-reset" onclick="resetForm()">
                        <i class="ti ti-refresh" aria-hidden="true"></i> Shorten another
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Copy Toast wrap -->
    <div class="toast-wrap" id="toast">
        <i class="ti ti-circle-check" aria-hidden="true"></i>
        <span id="toastTxt">Copied!</span>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        let tTimer;

        // Display toast message
        function toast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastTxt').textContent = msg;
            t.classList.add('show');
            clearTimeout(tTimer);
            tTimer = setTimeout(() => t.classList.remove('show'), 2400);
        }

        // Copy icon animation
        function cpIcon(id) {
            const b = document.getElementById(id);
            b.classList.add('ok');
            b.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i>';
            setTimeout(() => {
                b.classList.remove('ok');
                b.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i>';
            }, 1800);
        }

        function cpShort() {
            const val = document.getElementById('shortV').textContent;
            navigator.clipboard.writeText(val).then(() => {
                cpIcon('cpBtn');
                toast('Short URL copied!');
            });
        }

        function cpCode() {
            const val = document.getElementById('codeV').textContent;
            navigator.clipboard.writeText(val).then(() => {
                cpIcon('codeBtn');
                toast('Code copied!');
            });
        }

        function cpShortFull() {
            const val = document.getElementById('shortV').textContent;
            navigator.clipboard.writeText(val).then(() => {
                toast('Short URL copied to clipboard!');
            });
        }

        function resetForm() {
            document.getElementById('shortenForm').reset();
            const resEl = document.getElementById('resEl');
            if (resEl) {
                window.location.href = '/';
            } else {
                document.getElementById('uInput').focus();
            }
        }

        // Calculate stats if response exists from backend Thymeleaf
        const responseExists = /*[[${response != null}]]*/ false;
        if (responseExists) {
            const origUrl = /*[[${response != null ? response.originalUrl : ''}]]*/ '';
            const shortUrl = /*[[${response != null ? response.shortUrl : ''}]]*/ '';

            const oLen = origUrl.length;
            const sLen = shortUrl.length;
            const saved = Math.max(0, oLen - sLen);
            const pct = oLen > 0 ? Math.round((saved / oLen) * 100) : 0;

            document.getElementById('statsEl').innerHTML = `
                <div class="stat-box">
                    <div class="stat-num">${oLen}</div>
                    <div class="stat-lbl">original</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num">${sLen}</div>
                    <div class="stat-lbl">shortened</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num stat-save">${pct}%</div>
                    <div class="stat-lbl">smaller</div>
                </div>
            `;
        }
        /*]]>*/
    </script>
</body>

</html>
